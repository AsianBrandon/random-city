<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계 도시 랜덤 선택기</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow-x: hidden;
    }

    .stars {
      position: fixed;
      width: 100%; height: 100%;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px 60px;
      width: 100%;
      max-width: 780px;
    }

    .title {
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 40px;
    }

    .globe {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: rotate 8s linear infinite;
      display: inline-block;
    }

    @keyframes rotate {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .city-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      margin: 20px 0;
      backdrop-filter: blur(10px);
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .city-name {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.5s ease;
    }

    .city-region {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0.4;
      letter-spacing: 2px;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .placeholder { font-size: 1.2rem; opacity: 0.3; }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .btn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.4); }
    .btn:active { transform: translateY(0); }

    .btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn.secondary:hover { background: rgba(255,255,255,0.15); box-shadow: none; }

    #map {
      width: 100%;
      height: 360px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      margin-top: 10px;
      display: none;
      animation: fadeUp 0.5s ease;
    }

    .info-card {
      display: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px;
      margin-top: 16px;
      text-align: left;
      animation: fadeUp 0.5s ease;
    }

    .weather-card {
      background: linear-gradient(135deg, rgba(96,165,250,0.15), rgba(52,211,153,0.1));
      border: 1px solid rgba(96,165,250,0.25);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .weather-title {
      font-size: 0.75rem;
      letter-spacing: 2px;
      opacity: 0.5;
      margin-bottom: 14px;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .weather-item {
      text-align: center;
    }

    .weather-icon { font-size: 1.6rem; margin-bottom: 4px; }

    .weather-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: #60a5fa;
    }

    .weather-label {
      font-size: 0.7rem;
      opacity: 0.45;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .weather-loading {
      text-align: center;
      opacity: 0.4;
      font-size: 0.9rem;
      padding: 10px 0;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .info-item {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 16px 20px;
    }

    .info-label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      opacity: 0.4;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #a78bfa;
    }

    .info-intro {
      font-size: 0.95rem;
      line-height: 1.8;
      opacity: 0.75;
      margin-bottom: 20px;
      padding: 0 4px;
    }

    .spots-title {
      font-size: 0.75rem;
      letter-spacing: 2px;
      opacity: 0.4;
      margin-bottom: 12px;
    }

    .spots-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .spot {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spot-icon { font-size: 1.1rem; }

    .multi-section { width: 100%; margin-top: 16px; }

    .multi-title {
      font-size: 0.85rem;
      opacity: 0.4;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .tag {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .tag:hover { background: rgba(255,255,255,0.15); }

    .tag:nth-child(1) { animation-delay: 0.00s; }
    .tag:nth-child(2) { animation-delay: 0.07s; }
    .tag:nth-child(3) { animation-delay: 0.14s; }
    .tag:nth-child(4) { animation-delay: 0.21s; }
    .tag:nth-child(5) { animation-delay: 0.28s; }

    @media (max-width: 480px) {
      .info-grid, .spots-grid { grid-template-columns: 1fr; }
      .city-name { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="title">World City Picker</div>
    <div class="globe">🌍</div>

    <div class="city-box">
      <div class="placeholder" id="placeholder">버튼을 눌러 도시를 뽑아보세요</div>
      <div class="city-name" id="cityName" style="display:none"></div>
      <div class="city-region" id="cityRegion" style="display:none"></div>
    </div>

    <div class="btn-group">
      <button class="btn" onclick="pickOne()">🎲 도시 1개 뽑기</button>
      <button class="btn secondary" onclick="pickFive()">🗺️ 도시 5개 뽑기</button>
    </div>

    <div id="map"></div>

    <div class="info-card" id="infoCard">
      <div class="weather-card">
        <div class="weather-title">🌤️ 현재 날씨 (실시간)</div>
        <div id="weatherLoading" class="weather-loading">날씨 정보를 불러오는 중...</div>
        <div class="weather-grid" id="weatherGrid" style="display:none">
          <div class="weather-item">
            <div class="weather-icon">🌡️</div>
            <div class="weather-value" id="wTemp">--</div>
            <div class="weather-label">현재 온도</div>
          </div>
          <div class="weather-item">
            <div class="weather-icon">💧</div>
            <div class="weather-value" id="wHumidity">--</div>
            <div class="weather-label">상대습도</div>
          </div>
          <div class="weather-item">
            <div class="weather-icon">🤔</div>
            <div class="weather-value" id="wFeelsLike">--</div>
            <div class="weather-label">체감온도</div>
          </div>
        </div>
        <div id="weatherError" style="display:none; text-align:center; opacity:0.4; font-size:0.85rem; padding:8px 0;">날씨 정보를 불러올 수 없습니다</div>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">✈️ 한국에서 비행시간</div>
          <div class="info-value" id="infoFlight"></div>
        </div>
        <div class="info-item">
          <div class="info-label">🕐 한국과의 시차</div>
          <div class="info-value" id="infoTimeDiff"></div>
        </div>
      </div>
      <div class="info-intro" id="infoIntro"></div>
      <div class="spots-title">📍 주요 관광지</div>
      <div class="spots-grid" id="spotsGrid"></div>
    </div>

    <div class="multi-section" id="multiSection" style="display:none">
      <div class="multi-title">RANDOM PICKS — 클릭하면 지도에서 확인</div>
      <div class="tags" id="tags"></div>
    </div>
  </div>

  <script>
    const CITIES = [
      { name:"서울", region:"ASIA", lat:37.5665, lng:126.9780, flight:"국내", timeDiff:"없음", intro:"대한민국의 수도이자 약 1,000만 명이 거주하는 동아시아의 대표 메트로폴리스. 고궁과 첨단 도시가 공존하는 독특한 매력을 가진 도시입니다.", spots:["경복궁","남산서울타워","명동","북촌한옥마을"] },
      { name:"수원", region:"ASIA", lat:37.2636, lng:127.0286, flight:"국내", timeDiff:"없음", intro:"유네스코 세계문화유산 수원화성으로 유명한 경기도의 대표 도시. 조선시대 성곽 건축의 걸작을 직접 볼 수 있습니다.", spots:["수원화성","화성행궁","광교호수공원","수원전통시장"] },
      { name:"도쿄", region:"ASIA", lat:35.6762, lng:139.6503, flight:"약 2시간 30분", timeDiff:"없음 (동일)", intro:"일본의 수도이자 세계 최대 규모의 도시 중 하나. 전통과 현대가 절묘하게 어우러진 독보적인 도시 문화를 자랑합니다.", spots:["아사쿠사 센소지","시부야 스크램블교차로","신주쿠 교엔","도쿄 스카이트리"] },
      { name:"베이징", region:"ASIA", lat:39.9042, lng:116.4074, flight:"약 2시간", timeDiff:"-1시간", intro:"3,000년 역사를 지닌 중국의 수도. 수많은 왕조의 흔적이 곳곳에 남아 있으며 유네스코 세계유산이 집중되어 있습니다.", spots:["자금성 (고궁)","만리장성","천안문 광장","이화원"] },
      { name:"상하이", region:"ASIA", lat:31.2304, lng:121.4737, flight:"약 2시간", timeDiff:"-1시간", intro:"중국 최대의 경제 도시로, 황푸강을 사이에 두고 고전적인 와이탄과 현대적인 푸둥이 극적인 대비를 이룹니다.", spots:["와이탄","동방명주 TV타워","예원","상하이 디즈니랜드"] },
      { name:"홍콩", region:"ASIA", lat:22.3193, lng:114.1694, flight:"약 3시간 30분", timeDiff:"-1시간", intro:"동서양 문화가 융합된 국제 금융 도시. 세계 최고 수준의 야경과 딤섬을 비롯한 광둥 요리로 유명합니다.", spots:["빅토리아 피크","템플 스트리트 야시장","란타우섬 천단대불","스타의 거리"] },
      { name:"싱가포르", region:"ASIA", lat:1.3521, lng:103.8198, flight:"약 6시간 30분", timeDiff:"-1시간", intro:"아시아의 허브 도시국가로 청결함과 다문화 공존으로 유명합니다. 마리나 베이 샌즈는 세계적인 랜드마크입니다.", spots:["마리나 베이 샌즈","가든스 바이 더 베이","센토사 섬","차이나타운"] },
      { name:"방콕", region:"ASIA", lat:13.7563, lng:100.5018, flight:"약 5시간 30분", timeDiff:"-2시간", intro:"태국의 활기찬 수도로 화려한 불교 사원과 길거리 음식 문화, 야시장으로 전 세계 여행자를 매혹합니다.", spots:["왓 프라깨우 (에메랄드 사원)","왓 아룬","짜뚜짝 주말시장","카오산 로드"] },
      { name:"자카르타", region:"ASIA", lat:-6.2088, lng:106.8456, flight:"약 7시간", timeDiff:"-2시간", intro:"인도네시아의 수도이자 동남아시아 최대 도시 중 하나. 다양한 문화와 음식, 현대적인 쇼핑몰이 공존합니다.", spots:["국립기념탑 (모나스)","이스티클랄 모스크","코타 투아 (구시가지)","안쫄 드림랜드"] },
      { name:"쿠알라룸푸르", region:"ASIA", lat:3.1390, lng:101.6869, flight:"약 6시간 30분", timeDiff:"-1시간", intro:"말레이시아의 수도로 세계에서 가장 높은 쌍둥이 빌딩 페트로나스 타워가 상징입니다. 다민족 문화가 어우러진 매력적인 도시입니다.", spots:["페트로나스 트윈 타워","바투 동굴","차이나타운 (페탈링 스트리트)","KL 버드 파크"] },

      { name:"호치민", region:"ASIA", lat:10.8231, lng:106.6297, flight:"약 5시간 30분", timeDiff:"-2시간", intro:"베트남 최대의 경제 도시(구 사이공). 에너지 넘치는 오토바이 물결과 프랑스 식민지 시대의 건축물이 공존합니다.", spots:["전쟁박물관","통일궁","벤탄 시장","노트르담 대성당"] },
      { name:"뭄바이", region:"ASIA", lat:19.0760, lng:72.8777, flight:"약 9시간", timeDiff:"-3시간 30분", intro:"인도의 경제 수도이자 볼리우드 영화산업의 본거지. 아라비아해를 끼고 있으며 인도 최대의 상업·금융 중심지입니다.", spots:["인도의 관문","차트라파티 시바지 터미널","마린 드라이브","엘레판타 동굴"] },
      { name:"델리", region:"ASIA", lat:28.6139, lng:77.2090, flight:"약 8시간", timeDiff:"-3시간 30분", intro:"인도의 수도. 무굴 제국의 유산인 올드델리와 영국 식민지 시대에 건설된 뉴델리가 공존하는 역사의 도시입니다.", spots:["레드포트","꾸뜹 미나르","인디아 게이트","후마윤 묘"] },
      { name:"카라치", region:"ASIA", lat:24.8607, lng:67.0011, flight:"약 8시간", timeDiff:"-4시간", intro:"파키스탄 최대의 도시이자 경제 수도. 아라비아해에 접한 항구도시로 다양한 문화와 역사가 혼재합니다.", spots:["모하타 궁전","클리프턴 비치","콰이드 묘소","에머슨 시장"] },
      { name:"다카", region:"ASIA", lat:23.8103, lng:90.4125, flight:"약 5시간", timeDiff:"-3시간", intro:"방글라데시의 수도로 세계에서 가장 인구밀도가 높은 도시 중 하나. 생동감 넘치는 시장과 무굴 시대의 유적이 가득합니다.", spots:["라르바그 요새","아흐산 만질 궁전","꾸뚜브 모스크","사다르가트 강변"] },

      { name:"퍼스", region:"OCEANIA", lat:-31.9505, lng:115.8605, flight:"약 8시간", timeDiff:"-1시간", intro:"서호주의 주도로 세계에서 가장 외진 대도시 중 하나. 광활한 인도양 해변과 유니크한 야생동물, 풍요로운 와인 산지로 유명합니다.", spots:["킹스 파크","로트네스트 섬 (쿼카 서식지)","프리맨틀 항구 지구","피너클스 사막 (근교)"] },

    let map = null;
    let marker = null;

    async function fetchWeather(lat, lng) {
      document.getElementById('weatherLoading').style.display = 'block';
      document.getElementById('weatherGrid').style.display = 'none';
      document.getElementById('weatherError').style.display = 'none';

      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,apparent_temperature&timezone=auto`;
        const res = await fetch(url);
        const data = await res.json();
        const c = data.current;

        document.getElementById('wTemp').textContent = `${Math.round(c.temperature_2m)}°C`;
        document.getElementById('wHumidity').textContent = `${c.relative_humidity_2m}%`;
        document.getElementById('wFeelsLike').textContent = `${Math.round(c.apparent_temperature)}°C`;

        document.getElementById('weatherLoading').style.display = 'none';
        document.getElementById('weatherGrid').style.display = 'grid';
      } catch (e) {
        document.getElementById('weatherLoading').style.display = 'none';
        document.getElementById('weatherError').style.display = 'block';
      }
    }

    function showCityInfo(city) {
      document.getElementById('infoFlight').textContent = city.flight;
      document.getElementById('infoTimeDiff').textContent = city.timeDiff;
      document.getElementById('infoIntro').textContent = city.intro;
      const icons = ["🏛️","🌿","🎡","🗿"];
      document.getElementById('spotsGrid').innerHTML = city.spots.map((s, i) =>
        `<div class="spot"><span class="spot-icon">${icons[i]}</span>${s}</div>`
      ).join('');
      document.getElementById('infoCard').style.display = 'block';
      fetchWeather(city.lat, city.lng);
    }

    function showMap(city) {
      const mapEl = document.getElementById('map');
      mapEl.style.display = 'block';
      if (!map) {
        map = L.map('map').setView([city.lat, city.lng], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(map);
      } else {
        map.setView([city.lat, city.lng], 10);
      }
      if (marker) marker.remove();
      marker = L.marker([city.lat, city.lng])
        .addTo(map)
        .bindPopup(`<b>${city.name}</b><br>${city.region}`)
        .openPopup();
      setTimeout(() => map.invalidateSize(), 100);
    }

    function getRandom(n) {
      return [...CITIES].sort(() => Math.random() - 0.5).slice(0, n);
    }

    function pickOne() {
      const city = getRandom(1)[0];
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('multiSection').style.display = 'none';
      const nameEl = document.getElementById('cityName');
      const regionEl = document.getElementById('cityRegion');
      nameEl.style.display = 'none';
      regionEl.style.display = 'none';
      requestAnimationFrame(() => {
        nameEl.textContent = city.name;
        regionEl.textContent = city.region;
        nameEl.style.display = '';
        regionEl.style.display = '';
      });
      showMap(city);
      showCityInfo(city);
    }

    function pickFive() {
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('cityName').style.display = 'none';
      document.getElementById('cityRegion').style.display = 'none';
      document.getElementById('map').style.display = 'none';
      document.getElementById('infoCard').style.display = 'none';
      const cities = getRandom(5);
      const tagsEl = document.getElementById('tags');
      tagsEl.innerHTML = cities.map(c =>
        `<div class="tag" onclick="selectCity('${c.name}')">${c.name} <span style="opacity:0.4;font-size:0.75rem">${c.region}</span></div>`
      ).join('');
      document.getElementById('multiSection').style.display = 'block';
    }

    function selectCity(name) {
      const city = CITIES.find(c => c.name === name);
      if (!city) return;
      showMap(city);
      showCityInfo(city);
    }

    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      starsEl.appendChild(star);
    }
  </script>
