<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계 도시 랜덤 선택기</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow-x: hidden;
    }

    .stars {
      position: fixed;
      width: 100%; height: 100%;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      width: 100%;
      max-width: 750px;
    }

    .title {
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 40px;
    }

    .globe {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: rotate 8s linear infinite;
      display: inline-block;
    }

    @keyframes rotate {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .city-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      margin: 20px 0;
      backdrop-filter: blur(10px);
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .city-name {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.5s ease;
    }

    .city-region {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0.4;
      letter-spacing: 2px;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .placeholder { font-size: 1.2rem; opacity: 0.3; }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .btn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.4); }
    .btn:active { transform: translateY(0); }

    .btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn.secondary:hover { background: rgba(255,255,255,0.15); box-shadow: none; }

    #map {
      width: 100%;
      height: 380px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      margin-top: 10px;
      display: none;
      animation: fadeUp 0.5s ease;
    }

    .multi-section { width: 100%; margin-top: 10px; }

    .multi-title {
      font-size: 0.85rem;
      opacity: 0.4;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .tag {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .tag:hover { background: rgba(255,255,255,0.15); }

    .tag:nth-child(1) { animation-delay: 0.00s; }
    .tag:nth-child(2) { animation-delay: 0.07s; }
    .tag:nth-child(3) { animation-delay: 0.14s; }
    .tag:nth-child(4) { animation-delay: 0.21s; }
    .tag:nth-child(5) { animation-delay: 0.28s; }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="title">World City Picker</div>
    <div class="globe">🌍</div>

    <div class="city-box">
      <div class="placeholder" id="placeholder">버튼을 눌러 도시를 뽑아보세요</div>
      <div class="city-name" id="cityName" style="display:none"></div>
      <div class="city-region" id="cityRegion" style="display:none"></div>
    </div>

    <div class="btn-group">
      <button class="btn" onclick="pickOne()">🎲 도시 1개 뽑기</button>
      <button class="btn secondary" onclick="pickFive()">🗺️ 도시 5개 뽑기</button>
    </div>

    <div id="map"></div>

    <div class="multi-section" id="multiSection" style="display:none">
      <div class="multi-title">RANDOM PICKS — 클릭하면 지도에서 확인</div>
      <div class="tags" id="tags"></div>
    </div>
  </div>

    let map = null;
    let marker = null;

    function showMap(city) {
      const mapEl = document.getElementById('map');
      mapEl.style.display = 'block';

      if (!map) {
        map = L.map('map').setView([city.lat, city.lng], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(map);
      } else {
        map.setView([city.lat, city.lng], 10);
      }

      if (marker) marker.remove();
      marker = L.marker([city.lat, city.lng])
        .addTo(map)
        .bindPopup(`<b>${city.name}</b><br>${city.region}`)
        .openPopup();

      setTimeout(() => map.invalidateSize(), 100);
    }

    function getRandom(n) {
      return [...CITIES].sort(() => Math.random() - 0.5).slice(0, n);
    }

    function pickOne() {
      const city = getRandom(1)[0];

      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('multiSection').style.display = 'none';

      const nameEl = document.getElementById('cityName');
      const regionEl = document.getElementById('cityRegion');
      nameEl.style.display = 'none';
      regionEl.style.display = 'none';

      requestAnimationFrame(() => {
        nameEl.textContent = city.name;
        regionEl.textContent = city.region;
        nameEl.style.display = '';
        regionEl.style.display = '';
      });

      showMap(city);
    }

    function pickFive() {
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('cityName').style.display = 'none';
      document.getElementById('cityRegion').style.display = 'none';
      document.getElementById('map').style.display = 'none';

      const cities = getRandom(5);
      const tagsEl = document.getElementById('tags');
      tagsEl.innerHTML = cities.map((c, i) =>
        `<div class="tag" onclick="showMap(CITIES.find(x=>x.name==='${c.name}'))">${c.name} <span style="opacity:0.4;font-size:0.75rem">${c.region}</span></div>`
      ).join('');
      document.getElementById('multiSection').style.display = 'block';
    }

    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      starsEl.appendChild(star);
    }
